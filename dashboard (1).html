<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TML Parking — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0F13; --surface: #1A1A22; --surface2: #22222E; --border: #2E2E3E;
    --accent: #7B6EF6; --green: #22C55E; --green-bg: #0D2818;
    --amber: #F59E0B; --amber-bg: #281A05; --red: #EF4444; --red-bg: #2A0D0D;
    --blue: #60A5FA; --blue-bg: #0D1B2A;
    --text: #F0F0F8; --text2: #9090A8; --text3: #5A5A70;
    --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .topbar h1 { font-size: 15px; font-weight: 600; }
  .topbar p { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.15s; }
  .refresh-btn:hover { color: var(--text); }

  .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  @media (max-width: 700px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
  .kpi-num { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; line-height: 1; }
  .kpi-num.green { color: var(--green); }
  .kpi-num.blue  { color: var(--blue); }
  .kpi-num.amber { color: var(--amber); }
  .kpi-num.red   { color: var(--red); }

  /* FILTERS */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; }
  .table-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-header h2 { font-size: 14px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid rgba(46,46,62,0.5); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .empl-badge { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--accent); font-size: 15px; }
  .libre-row td { opacity: 0.35; }

  /* STATUS BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-libre  { background: var(--green-bg); color: var(--green); }
  .badge-traiter{ background: var(--amber-bg); color: var(--amber); }
  .badge-bloquee{ background: var(--red-bg);   color: var(--red); }

  /* DEPT BADGE */
  .dept { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); font-family: 'DM Mono', monospace; }

  /* HISTORIQUE */
  .hist-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 20px; border-bottom: 1px solid rgba(46,46,62,0.5); }
  .hist-item:last-child { border-bottom: none; }
  .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .hist-dot.depot   { background: var(--green); }
  .hist-dot.retrait { background: var(--red); }
  .hist-body { flex: 1; }
  .hist-title { font-size: 13px; font-weight: 500; }
  .hist-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .hist-time  { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; flex-shrink: 0; }

  .empty { padding: 40px; text-align: center; color: var(--text3); font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon">🚛</div>
    <div>
      <h1>TML Parking — Dashboard</h1>
      <p id="last-update">Chargement…</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
</div>

<div class="content">

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Emplacements libres</div><div class="kpi-num green" id="kpi-libre">—</div></div>
    <div class="kpi"><div class="kpi-label">Emplacements occupés</div><div class="kpi-num blue" id="kpi-occupe">—</div></div>
    <div class="kpi"><div class="kpi-label">À traiter</div><div class="kpi-num amber" id="kpi-traiter">—</div></div>
    <div class="kpi"><div class="kpi-label">Bloquées</div><div class="kpi-num red" id="kpi-bloquee">—</div></div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('Aldi',this)">Aldi</button>
    <button class="filter-btn" onclick="setFilter('Nike',this)">Nike</button>
    <button class="filter-btn" onclick="setFilter('Chaussea',this)">Chaussea</button>
    <button class="filter-btn" onclick="setFilter('Fleet',this)">Fleet</button>
    <button class="filter-btn" onclick="setFilter('occupe',this)">Occupés</button>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h2>État du parking — 25 emplacements</h2>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Empl.</th>
            <th>Département</th>
            <th>Remorque / Plaque</th>
            <th>N° voyage</th>
            <th>Date dépôt</th>
            <th>Heure</th>
            <th>Statut</th>
            <th>Commentaire</th>
          </tr>
        </thead>
        <tbody id="parking-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header"><h2>Historique des mouvements</h2></div>
    <div id="history-list"></div>
  </div>

</div>

<script>
// ── CONFIG ───────────────────────────────────────────────
const WEBHOOK_GET = "https://script.google.com/macros/s/AKfycbwLbD-iQ0Vt2shPlKpOXwgjn1Et7oPPW4ZygmNq3RJlPOlzpC2La8RkLcySzNYy3s4PzA/exec"; // URL Power Automate pour lire les données

// ── STATE ────────────────────────────────────────────────
let parkingData  = [];
let historyData  = [];
let currentFilter = 'all';

// ── LOAD ─────────────────────────────────────────────────
async function loadData() {
  document.getElementById('last-update').textContent = 'Chargement…';
  try {
    const res  = await fetch(WEBHOOK_GET);
    const data = await res.json();
    parkingData = data.parking  || [];
    historyData = data.historique || [];
  } catch(e) {
    // Mode démo si pas de webhook
    parkingData = [];
    historyData = [];
  }
  render();
  document.getElementById('last-update').textContent = 'Mis à jour à ' + new Date().toLocaleTimeString('fr-BE', {hour:'2-digit',minute:'2-digit'});
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  const occupied = parkingData.filter(r => r.emplacement);
  const occupiedNums = new Set(occupied.map(r => Number(r.emplacement)));
  const libre   = 25 - occupied.length;
  const traiter = occupied.filter(r => r.statut === 'À traiter').length;
  const bloquee = occupied.filter(r => r.statut === 'Bloquée').length;

  document.getElementById('kpi-libre').textContent   = libre;
  document.getElementById('kpi-occupe').textContent  = occupied.length;
  document.getElementById('kpi-traiter').textContent = traiter;
  document.getElementById('kpi-bloquee').textContent = bloquee;

  // Table
  const tbody = document.getElementById('parking-tbody');
  let rows = '';
  for (let i = 1; i <= 25; i++) {
    const d = occupied.find(r => Number(r.emplacement) === i);
    if (currentFilter === 'occupe' && !d) continue;
    if (currentFilter !== 'all' && currentFilter !== 'occupe' && (!d || d.departement !== currentFilter)) continue;

    if (d) {
      const badgeClass = d.statut === 'Bloquée' ? 'badge-bloquee' : 'badge-traiter';
      rows += `<tr>
        <td><span class="empl-badge">${i}</span></td>
        <td><span class="dept">${d.departement||'—'}</span></td>
        <td style="font-family:'DM Mono',monospace;font-weight:500">${d.remorque||'—'}</td>
        <td style="color:var(--text2)">${d.voyage||'—'}</td>
        <td style="color:var(--text2)">${d.date||'—'}</td>
        <td style="color:var(--text2)">${d.heure||'—'}</td>
        <td><span class="badge ${badgeClass}">${d.statut||'—'}</span></td>
        <td style="color:var(--text2);font-size:12px;max-width:200px">${d.commentaire||'—'}</td>
      </tr>`;
    } else {
      rows += `<tr class="libre-row">
        <td><span class="empl-badge">${i}</span></td>
        <td colspan="7"><span class="badge badge-libre">Libre</span></td>
      </tr>`;
    }
  }
  tbody.innerHTML = rows || `<tr><td colspan="8" class="empty">Aucune remorque enregistrée</td></tr>`;

  // Historique
  const histEl = document.getElementById('history-list');
  if (!historyData.length) {
    histEl.innerHTML = '<div class="empty">Aucun mouvement enregistré</div>';
    return;
  }
  histEl.innerHTML = historyData.slice(0,30).map(h => `
    <div class="hist-item">
      <div class="hist-dot ${h.type === 'Dépôt' ? 'depot' : 'retrait'}"></div>
      <div class="hist-body">
        <div class="hist-title">${h.remorque} — Empl. ${h.emplacement} <span class="dept">${h.departement}</span></div>
        <div class="hist-sub">${h.type}${h.voyage ? ' · ' + h.voyage : ''}${h.commentaireDepot ? ' · ' + h.commentaireDepot : ''}${h.commentaireRetrait ? ' · Retrait : ' + h.commentaireRetrait : ''}</div>
      </div>
      <div class="hist-time">${h.date}<br>${h.heure}</div>
    </div>`).join('');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// Auto-refresh toutes les 60 secondes
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
